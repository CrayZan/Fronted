<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostal del Milagro | Panel de Control</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">🏨 Hostal del Milagro</div>
            <ul class="nav-links">
                <li><a href="#">Inicio</a></li>
                <li><a href="#">Habitaciones</a></li>
                <li><a href="#">Reservas</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        <header class="header-section">
            <h1>Panel de Administración</h1>
            <p>Gestiona la información de tu servidor en tiempo real.</p>
        </header>

        <section class="admin-card">
            <div class="card-header">
                <span class="status-dot"></span>
                <h2 id="estado">Estado: Listo para conectar</h2>
            </div>
            
            <button id="botonCargar" class="btn-primary">
                🔄 Actualizar Información
            </button>

            <div id="datos" class="data-display">
                <p class="placeholder-text">Los datos aparecerán aquí...</p>
            </div>
        </section>

        <section class="gallery-preview">
            <h3>Vista Previa del Hostal</h3>
            <div class="grid">
                <div class="grid-item">
                    <img src="https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=300&q=80" alt="Hotel">
                    <p>Fachada Principal</p>
                </div>
                <div class="grid-item">
                    <img src="https://images.unsplash.com/photo-1590490360182-c33d57733427?auto=format&fit=crop&w=300&q=80" alt="Habitación">
                    <p>Habitación Doble</p>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
